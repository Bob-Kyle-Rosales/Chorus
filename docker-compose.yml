services:
  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=chorus
      - POSTGRES_PASSWORD=chorus
      - POSTGRES_DB=chorus
    volumes:
      - chorus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chorus"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - chorus_net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      - ALLOWED_ORIGINS=["http://localhost:3000"]
      - DATABASE_URL=postgresql+asyncpg://chorus:chorus@db:5432/chorus

    volumes:
      - ./backend/src:/app/src

    depends_on:
      db:
        condition: service_healthy

    restart: on-failure

    networks:
      - chorus_net

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    ports:
      - "3000:3000"

    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000

    depends_on:
      - api

    networks:
      - chorus_net

volumes:
  chorus_pgdata:

networks:
  chorus_net:
    driver: bridge
