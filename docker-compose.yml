# docker-compose.yml
# Defines both Chorus services and how they connect.
#
# Run everything with one command:
#   docker compose up --build
#
# Services:
#   api  — FastAPI backend (Python, port 8000)
#   web  — Next.js frontend (Node.js, port 3000)
#
# Phase 2 additions:
#   db    — Postgres for session persistence (Milestone 7)
#   redis — Cache for search results (not yet)

services:

  # --------------------------------------------------------------------------
  # db — Postgres (session/message/credit persistence, Milestone 7)
  # --------------------------------------------------------------------------
  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=chorus
      - POSTGRES_PASSWORD=chorus
      - POSTGRES_DB=chorus
    # Named volume so data survives container restarts.
    volumes:
      - chorus_pgdata:/var/lib/postgresql/data
    # Healthcheck so `api` can wait until Postgres is actually ready,
    # not just started.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chorus"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --------------------------------------------------------------------------
  # api — FastAPI backend
  # --------------------------------------------------------------------------
  api:
    # Build the image from backend/Dockerfile
    build:
      context: ./backend
      dockerfile: Dockerfile

    # Map container port 8000 → host port 8000
    # Access the API at http://localhost:8000
    ports:
      - "8000:8000"

    # Load environment variables from .env at the repo root.
    # This is where API keys (GROQ_API_KEY, TAVILY_API_KEY, etc.) live.
    # Never commit the .env file — it's in .gitignore.
    env_file:
      - .env

    environment:
      # Override allowed origins to include the Docker web service.
      - ALLOWED_ORIGINS=["http://localhost:3000"]
      # Point the backend at the Postgres service (hostname = service name "db").
      # Locally without Docker the app falls back to SQLite (see config.py default).
      - DATABASE_URL=postgresql+asyncpg://chorus:chorus@db:5432/chorus

    # Hot-reload during development: mount source code as a volume.
    # Changes to Python files are picked up without rebuilding the image.
    # Remove this in a production deployment.
    volumes:
      - ./backend/src:/app/src

    # Start only after Postgres reports healthy.
    depends_on:
      db:
        condition: service_healthy

  # --------------------------------------------------------------------------
  # web — Next.js frontend
  # --------------------------------------------------------------------------
  web:
    # Build the image from frontend/Dockerfile
    build:
      context: ./frontend
      dockerfile: Dockerfile

    # Map container port 3000 → host port 3000
    # Access the frontend at http://localhost:3000
    ports:
      - "3000:3000"

    environment:
      # Tell the frontend where to find the backend WebSocket.
      # From the browser's perspective, both services are on localhost,
      # so we use the host-facing port (8000), not the container name.
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000

    # Start web only after api is running.
    # This doesn't wait for the API to be healthy — just started.
    depends_on:
      - api

# Named volumes — persist Postgres data across `docker compose down`/`up`.
volumes:
  chorus_pgdata:
